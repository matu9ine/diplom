# Render Blueprint for the masterico project.
# Deploys: Django API (web service) + React frontend (static site).
# The PostgreSQL database is external (e.g. Neon free tier) — its URL is set
# manually in the masterico-api "DATABASE_URL" environment variable.
# Docs: https://render.com/docs/blueprint-spec

services:
  # ---------- Django backend (API) ----------
  - type: web
    name: masterico-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: "bash ./render-build.sh"
    startCommand: "cd backend_django && gunicorn backend_django.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.10"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      # Paste the external PostgreSQL connection string here in the Render dashboard.
      - key: DATABASE_URL
        sync: false

  # ---------- React frontend (static site) ----------
  - type: web
    runtime: static
    name: masterico-web
    rootDir: masterico
    buildCommand: "npm install && npm run build"
    staticPublishPath: build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # Build-time API URL baked into the React bundle.
      # Must be the API service's PUBLIC url (the browser calls it directly).
      # If Render appends a suffix to the API hostname, update this value and redeploy.
      - key: REACT_APP_API_URL
        value: https://masterico-api.onrender.com
